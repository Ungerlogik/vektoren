<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vektor-Labyrinth v2</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --wall-color: #2c3e50;
            --path-color: #ffffff;
            --grid-color: #dfe6e9;
            --player-color: #3498db;
            --target-color: #27ae60;
            --origin-color: #e74c3c;
            --vector-color: #f1c40f;
            --ui-bg: #ffffff;
            --text-color: #333;
            --teleport-color: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            gap: 20px;
            color: var(--text-color);
        }

        /* --- Labyrinth Bereich (Links) --- */
        #game-container {
            flex: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--ui-bg);
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            padding: 30px; /* Platz für Achsenbeschriftung außen */
            position: relative;
            overflow: hidden; /* Verhindert, dass Pfeile beim Ziehen rausstehen */
        }

        #maze-board {
            position: relative;
            /* Größe wird per JS berechnet */
            border: 2px solid #ccc;
        }

        .tile {
            position: absolute;
            box-sizing: border-box;
            border: 1px solid var(--grid-color);
        }

        .wall { background-color: var(--wall-color); border-color: #1a252f;}
        .path { background-color: var(--path-color); }
        .target { background-color: var(--target-color); }
        .origin { background-color: var(--path-color); }
        .teleport { background-color: var(--teleport-color); }

        /* Achsen */
        .axis-x { position: absolute; background: var(--origin-color); height: 2px; z-index: 5; pointer-events: none;}
        .axis-y { position: absolute; background: var(--origin-color); width: 2px; z-index: 5; pointer-events: none;}

        /* Achsenbeschriftung (außerhalb des Boards) */
        .axis-label {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            color: var(--origin-color);
            z-index: 4;
            pointer-events: none;
        }

        /* Spieler */
        #player {
            position: absolute;
            background-color: var(--player-color);
            border-radius: 50%;
            z-index: 10;
            transition: all 0.5s linear; /* Lineare Animation für gleichmäßige Geschwindigkeit */
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.7);
        }

        /* --- UI Bereich (Rechts) --- */
        #ui-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
        }

        .panel {
            background: var(--ui-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        h2 { margin-top: 0; color: #2c3e50; font-size: 1.2em;}

        /* --- Vektor Eingabe (Spaltenformat mit großen Klammern) --- */
        .vector-input-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .vector-bracket {
            font-size: 80px; /* Sehr groß für Umschließung */
            font-weight: 100;
            color: var(--text-color);
            line-height: 0.8;
            margin-top: -10px; /* Optische Korrektur */
            user-select: none;
        }

        .vector-fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .vector-fields input {
            width: 60px;
            text-align: center;
            font-size: 20px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
        }
        .vector-fields input:focus { border-color: var(--player-color); outline: none; }

        #spawn-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: var(--player-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #spawn-btn:hover { background-color: #2980b9; }

        /* --- Inventar mit Pfeil-Icons --- */
        #inventory {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            min-height: 120px;
            border: 2px dashed #cbd5e0;
            padding: 15px;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .vector-item {
            width: 60px; height: 60px; /* Feste Größe für Icons */
            background: var(--vector-color);
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
        }
        .vector-item:hover { transform: scale(1.05); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .vector-item:active { transform: scale(0.95); }

        /* Das SVG Pfeil-Icon */
        .vector-icon {
            width: 80%; height: 80%;
            pointer-events: none; /* Klick geht durch auf das div */
        }

        /* Textbeschriftung am Pfeil (optional, hilft Schülern) */
        .vector-label-mini {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            font-weight: bold;
            background: rgba(255,255,255,0.7);
            padding: 1px 3px;
            border-radius: 3px;
            pointer-events: none;
        }

        #message {
            margin-top: 10px;
            color: #e74c3c;
            font-weight: bold;
            min-height: 1.2em;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="maze-board" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    </div>

    <div id="ui-container">
        <div class="panel">
            <h2>Neuen Vektor definieren</h2>
            <div class="vector-input-area">
                <span class="vector-bracket">(</span>
                <div class="vector-fields">
                    <input type="number" id="vec-x" placeholder="x" value="2">
                    <input type="number" id="vec-y" placeholder="y" value="1">
                </div>
                <span class="vector-bracket">)</span>
            </div>
            <button id="spawn-btn" onclick="spawnVector()">Pfeil erzeugen</button>
            <p id="message"></p>
        </div>

        <div class="panel" style="flex: 1; overflow-y: auto;">
            <h2>Verfügbare Pfeile (Inventar)</h2>
            <p style="font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 15px;">Ziehe einen Pfeil auf das Feld oder klicke ihn an.</p>
            <div id="inventory"></div>
        </div>

        <div class="panel">
            <h2>Level-Auswahl</h2>
            <select id="level-select" style="width: 100%; padding: 8px; font-size: 16px; margin-bottom: 10px;" onchange="changeLevel()">
                </select>
            <p id="level-desc" style="font-size: 14px; color: #555; margin: 0; min-height: 40px;"></p>
        </div>

        <div class="panel">
            <details>
                <summary style="font-size: 1.2em; font-weight: bold; color: #2c3e50; cursor: pointer; user-select: none; outline: none;">
                    🛠️ Eigenes Level bauen
                </summary>

                <div style="margin-top: 15px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px 10px; font-size: 12px; color: #666; margin-top: 0; margin-bottom: 10px;">
                        <span><strong>x</strong> Wand</span>
                        <span><strong>-</strong> Weg</span>
                        <span><strong>t</strong> Teleport</span>
                        <span><strong>s</strong> Start</span>
                        <span><strong>z</strong> Ziel</span>
                        <span><strong>o</strong> Ursprung (0|0)</span>
                    </div>
                    <textarea id="custom-level-input" rows="6" style="width: 100%; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 8px; box-sizing: border-box; resize: vertical; border: 2px solid #ddd; border-radius: 8px;" placeholder="xxxxxxx&#10;x-s-o-x&#10;x-----x&#10;x-z---x&#10;xxxxxxx"></textarea>
                    <button onclick="loadCustomLevel()" style="width: 100%; margin-top: 10px; padding: 12px; background-color: var(--target-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s;">Eigenes Level laden</button>
                </div>
            </details>
        </div>
    </div>

<script>
    // ==========================================
    // LEVEL DATEN
    // ==========================================
    const gameLevels = [
        {
            id: 1,
            title: "Level 1: Der erste Schritt",
            description: "Bewege dich zum Ziel (grünes Feld). Nutze einen einzigen Vektor.",
            map: `
xxxxxxx
x-----x
x-z---x
x-----x
x-s-o-x
xxxxxxx`
        },
        {
            id: 2,
            title: "Level 2: Der Rückwärtsgang",
            description: "Negative Koordinaten ändern die Richtung.",
            map: `
xxxxxxx
x-s-o-x
x-----x
x-z---x
xxxxxxx`
        },
        {
            id: 3,
            title: "Level 3: Die Diagonale",
            description: "Kombiniere x und y in einem einzigen Vektor.",
            map: `
xxxxxxxxx
x-z-----x
x-------x
x-------x
x-----s-x
x-----o-x
xxxxxxxxx`
        },
        {
            id: 4,
            title: "Level 4: Der L-Zug",
            description: "Die direkte Linie ist blockiert. Addiere zwei Vektoren aneinander.",
            map: `
xxxxxxxxx
x-z-----x
x-xxx---x
x---x---x
x---x-s-x
x---x-o-x
xxxxxxxxx`
        },
        {
            id: 5,
            title: "Level 5: Die Schlucht",
            description: "Kleine Schritte führen in den Teleporter (lila Feld). Finde den exakten Abstand!",
            map: `
xxxxxxxxxxxxxx
x-o-s-tttttz-x
xxxxxxxxxxxxxx`
        },
        {
            id: 6,
            title: "Level 6: Das Nadelöhr",
            description: "Präzision ist gefragt. Schätzen führt zurück zum Start.",
            map: `
xxxxxxxxxxx
x---x-t-xzx
x-x-x-x-x-x
x-x---x---x
x-xxxxxxx-x
xot-s-x---x
xxxxxxxxxxx`
        },
        {
            id: 7,
            title: "Level 7: Der Zickzack-Kurs",
            description: "Schaffst du das Level in maximal 3 Zügen?",
            map: `
xxxxxxxxxxxxx
x-z---x-----x
xxx-x-x-xxx-x
x---x---x---x
x-xxxxxxx-xxx
x-o-s-------x
xxxxxxxxxxxxx`
        }
    ];

    // ==========================================
    // 2. SPIEL STATUS & VARIABLEN
    // ==========================================
    let currentLevelIndex = 0;
    let maze = [];
    let cols = 0, rows = 0;
    let origin = { x: 0, y: 0 };
    let playerPos = { x: 0, y: 0 };
    let targetPos = { x: 0, y: 0 };
    let startPos = { x: 0, y: 0 };
    let tileSize = 0;
    let spawnedVectors = new Set();
    let isMoving = false;

    // ==========================================
    // 3. HILFSFUNKTIONEN (SVG & Grafik)
    // ==========================================
    function createVectorSVG(vx, vy, color = "#333") {
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("viewBox", "-110 -110 220 220");
        svg.classList.add("vector-icon");

        const defs = document.createElementNS(svgNS, "defs");
        const marker = document.createElementNS(svgNS, "marker");
        marker.setAttribute("id", "arrowhead");
        marker.setAttribute("markerWidth", "10");
        marker.setAttribute("markerHeight", "7");
        marker.setAttribute("refX", "9");
        marker.setAttribute("refY", "3.5");
        marker.setAttribute("orient", "auto");

        const polygon = document.createElementNS(svgNS, "polygon");
        polygon.setAttribute("points", "0 0, 10 3.5, 0 7");
        polygon.setAttribute("fill", color);

        marker.appendChild(polygon);
        defs.appendChild(marker);
        svg.appendChild(defs);

        const mag = Math.sqrt(vx*vx + vy*vy);
        const len = 90;
        const scale = (mag === 0) ? 0 : len / mag;

        const line = document.createElementNS(svgNS, "line");
        line.setAttribute("x1", "0");
        line.setAttribute("y1", "0");
        line.setAttribute("x2", (vx * scale).toString());
        line.setAttribute("y2", (-vy * scale).toString());
        line.setAttribute("stroke", color);
        line.setAttribute("stroke-width", "12");
        line.setAttribute("marker-end", "url(#arrowhead)");

        svg.appendChild(line);
        return svg;
    }

    // ==========================================
    // 4. LEVEL AUFBAU & ZEICHNEN
    // ==========================================
    function initLevel(text) {
        let lines = text.trim().split('\n');
        lines.reverse();
        rows = lines.length;
        cols = lines[0].length;

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (lines[y][x] === 'o') { origin.x = x; origin.y = y; }
            }
        }

        maze = [];
        let playerFound = false;

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let mathX = x - origin.x;
                let mathY = y - origin.y;
                let char = lines[y][x];

                maze.push({ x: mathX, y: mathY, type: char });

                if (char === 's') {
                    playerPos = { x: mathX, y: mathY };
                    playerFound = true;
                }
                if (char === 'z') targetPos = { x: mathX, y: mathY };
            }
        }

        if (!playerFound) {
            playerPos = { x: 0, y: 0 };
        }

        startPos = { x: playerPos.x, y: playerPos.y };

        drawBoard();
    }

    function drawBoard() {
        const container = document.getElementById('game-container');
        const board = document.getElementById('maze-board');
        board.innerHTML = '';

        const maxW = container.clientWidth - 60;
        const maxH = container.clientHeight - 60;
        tileSize = Math.min(Math.floor(maxW / cols), Math.floor(maxH / rows));

        board.style.width = (cols * tileSize) + 'px';
        board.style.height = (rows * tileSize) + 'px';

        maze.forEach(cell => {
            let div = document.createElement('div');
            div.classList.add('tile');
            if (cell.type === 'x') div.classList.add('wall');
            else if (cell.type === 'z') div.classList.add('target');
            else if (cell.type === 't') div.classList.add('teleport');
            else div.classList.add('path');

            div.style.width = tileSize + 'px';
            div.style.height = tileSize + 'px';
            div.style.left = ((cell.x + origin.x) * tileSize) + 'px';
            div.style.bottom = ((cell.y + origin.y) * tileSize) + 'px';
            board.appendChild(div);
        });

        let xAxis = document.createElement('div');
        xAxis.classList.add('axis-x');
        xAxis.style.width = (cols * tileSize) + 'px';
        xAxis.style.bottom = (origin.y * tileSize + tileSize/2 - 1) + 'px';
        xAxis.style.left = '0px';
        board.appendChild(xAxis);

        let yAxis = document.createElement('div');
        yAxis.classList.add('axis-y');
        yAxis.style.height = (rows * tileSize) + 'px';
        yAxis.style.left = (origin.x * tileSize + tileSize/2 - 1) + 'px';
        yAxis.style.bottom = '0px';
        board.appendChild(yAxis);

        for (let x = 0; x < cols; x++) {
            let mathX = x - origin.x;
            if (mathX === 0) continue;
            let label = document.createElement('div');
            label.classList.add('axis-label');
            label.innerText = mathX;

            board.appendChild(label);
            let labelW = label.offsetWidth;

            label.style.left = (x * tileSize + tileSize/2 - labelW/2) + 'px';
            label.style.bottom = (origin.y * tileSize + tileSize/2 - 20) + 'px';
        }

        for (let y = 0; y < rows; y++) {
            let mathY = y - origin.y;
            if (mathY === 0) continue;
            let label = document.createElement('div');
            label.classList.add('axis-label');
            label.innerText = mathY;

            board.appendChild(label);
            let labelH = label.offsetHeight;
            let labelW = label.offsetWidth;

            label.style.left = (origin.x * tileSize + tileSize/2 - labelW - 8) + 'px';
            label.style.bottom = (y * tileSize + tileSize/2 - labelH/2) + 'px';
        }

        let zeroLabel = document.createElement('div');
        zeroLabel.classList.add('axis-label');
        zeroLabel.innerText = "0";
        board.appendChild(zeroLabel);
        zeroLabel.style.left = (origin.x * tileSize + tileSize/2 - zeroLabel.offsetWidth - 4) + 'px';
        zeroLabel.style.bottom = (origin.y * tileSize + tileSize/2 - 18) + 'px';

        let player = document.createElement('div');
        player.id = 'player';
        player.style.width = (tileSize * 0.7) + 'px';
        player.style.height = (tileSize * 0.7) + 'px';
        player.style.marginLeft = (tileSize * 0.15) + 'px';
        player.style.marginBottom = (tileSize * 0.15) + 'px';
        board.appendChild(player);

        updatePlayerPositionVisually(false);
    }

    function updatePlayerPositionVisually(animate = true) {
        const player = document.getElementById('player');
        if (!animate) {
            player.style.transition = 'none';
        } else {
            player.style.transition = 'all 0.5s linear';
        }

        player.style.left = ((playerPos.x + origin.x) * tileSize) + 'px';
        player.style.bottom = ((playerPos.y + origin.y) * tileSize) + 'px';

        if (!animate) {
            player.offsetHeight;
            player.style.transition = 'all 0.5s linear';
        }
    }

    function showMessage(msg) {
        const msgEl = document.getElementById('message');
        msgEl.innerText = msg;
        setTimeout(() => { if(msgEl.innerText === msg) msgEl.innerText = ''; }, 4000);
    }

    // ==========================================
    // 5. VEKTOR LOGIK & BEWEGUNG
    // ==========================================
    function spawnVector() {
        let vx = parseInt(document.getElementById('vec-x').value);
        let vy = parseInt(document.getElementById('vec-y').value);

        if (isNaN(vx) || isNaN(vy)) { showMessage("Bitte x und y eingeben!"); return; }
        if (vx === 0 && vy === 0) { showMessage("Nullvektor nicht erlaubt."); return; }

        let vecString = `${vx},${vy}`;
        if (spawnedVectors.has(vecString)) {
            showMessage("Dieser Vektor existiert bereits!");
            playErrorSound();
            return;
        }

        spawnedVectors.add(vecString);

        const inv = document.getElementById('inventory');
        let item = document.createElement('div');
        item.classList.add('vector-item');
        item.draggable = true;
        item.title = `Vektor (${vx}, ${vy})`;

        item.appendChild(createVectorSVG(vx, vy));

        let label = document.createElement('span');
        label.classList.add('vector-label-mini');
        label.innerText = `${vx},${vy}`;
        item.appendChild(label);

        item.onclick = () => applyVector(vx, vy);
        item.ondragstart = (e) => {
            e.dataTransfer.setData("text/plain", vecString);
        };

        inv.appendChild(item);
    }

    function allowDrop(e) { e.preventDefault(); }
    function drop(e) {
        e.preventDefault();
        let data = e.dataTransfer.getData("text/plain");
        if(!data) return;
        let [vx, vy] = data.split(',').map(Number);
        applyVector(vx, vy);
    }

    function applyVector(vx, vy) {
        if (isMoving) return;

        let startX = playerPos.x;
        let startY = playerPos.y;

        let steps = Math.max(Math.abs(vx), Math.abs(vy)) * 20;
        if (steps === 0) return;

        let validX = startX;
        let validY = startY;
        let hitWall = false;
        let hitTeleport = false;

        // 1. Flugbahn prüfen (Darf nicht durch Wände fliegen)
        for (let i = 1; i <= steps; i++) {
            let t = i / steps;
            let curX = startX + (vx * t);
            let curY = startY + (vy * t);

            let tileX = Math.round(curX);
            let tileY = Math.round(curY);

            let cell = maze.find(c => c.x === tileX && c.y === tileY);

            // Nur noch Wände und den Rand prüfen!
            if (!cell || cell.type === 'x') {
                hitWall = true;
                break;
            }

            validX = tileX;
            validY = tileY;
        }

        if (hitWall) {
            playErrorSound();
            showMessage("Zug nicht möglich! Wand im Weg.");
            return;
        }

        // 2. Landezone prüfen (Ist der Endpunkt ein Teleporter?)
        let finalCell = maze.find(c => c.x === validX && c.y === validY);
        if (finalCell && finalCell.type === 't') {
            hitTeleport = true;
        }

        isMoving = true;
        playerPos = { x: validX, y: validY };

        updatePlayerPositionVisually(true);

        setTimeout(() => {
            isMoving = false;

            if (hitTeleport) {
                playErrorSound();
                showMessage("In den Abgrund getreten! Zurück zum Start.");
                playerPos = { x: startPos.x, y: startPos.y };
                updatePlayerPositionVisually(false);
            } else if (playerPos.x === targetPos.x && playerPos.y === targetPos.y) {
                playWinSound();
                showMessage("ZIEL ERREICHT! Super!");
            }
        }, 500);
    }

    function playErrorSound() { console.log("BEEP! (Fehler)"); }
    function playWinSound() { console.log("TADAAA! (Gewonnen)"); }

    // ==========================================
    // 6. LEVEL MANAGEMENT & START
    // ==========================================
    function initLevelSelect() {
        const select = document.getElementById('level-select');
        select.innerHTML = '';

        gameLevels.forEach((lvl, index) => {
            let option = document.createElement('option');
            option.value = index;
            option.innerText = lvl.title;
            select.appendChild(option);
        });

        loadLevel(0);
    }

    function changeLevel() {
        const select = document.getElementById('level-select');
        loadLevel(parseInt(select.value));
    }

    function loadLevel(index) {
        currentLevelIndex = index;
        const levelData = gameLevels[index];

        document.getElementById('level-desc').innerText = levelData.description;
        document.getElementById('message').innerText = '';

        isMoving = false;
        spawnedVectors.clear();
        document.getElementById('inventory').innerHTML = '';

        document.getElementById('vec-x').value = "";
        document.getElementById('vec-y').value = "";

        initLevel(levelData.map);
    }

    function loadCustomLevel() {
        // 1. Text holen und bereinigen (leere Zeilen am Anfang/Ende entfernen)
        let rawText = document.getElementById('custom-level-input').value;
        let lines = rawText.split('\n').map(line => line.trim()).filter(line => line.length > 0);

        if (lines.length === 0) {
            showMessage("Das Feld ist leer!");
            return;
        }

        let customText = lines.join('\n');

        // 2. Prüfen auf Pflicht-Symbole
        if (!customText.includes('o')) {
            showMessage("Fehler: Dein Level braucht einen Ursprung (o)!");
            return;
        }
        if (!customText.includes('s')) {
            showMessage("Fehler: Dein Level braucht einen Startpunkt (s)!");
            return;
        }
        if (!customText.includes('z')) {
            showMessage("Fehler: Dein Level braucht ein Ziel (z)!");
            return;
        }

        // 3. Prüfen, ob das Level ein sauberes Rechteck ist
        let firstLineLength = lines[0].length;
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].length !== firstLineLength) {
                showMessage("Fehler: Alle Zeilen müssen gleich lang sein!");
                return;
            }
        }

        // 4. Spielstatus zurücksetzen (wie bei den Standard-Leveln)
        document.getElementById('level-desc').innerText = "Eigenes Level geladen.";
        document.getElementById('message').innerText = '';

        isMoving = false;
        spawnedVectors.clear();
        document.getElementById('inventory').innerHTML = '';
        document.getElementById('vec-x').value = "";
        document.getElementById('vec-y').value = "";

        // 5. Level starten
        initLevel(customText);
        showMessage("Eigenes Level erfolgreich geladen!");
    }

    // Start aufrufen
    initLevelSelect();

    window.addEventListener('resize', () => {
        drawBoard();
    });
</script>
</body>
</html>
